  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

one\" stroke=\"#22D3EE\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg><span>Stavanger, Norge<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== CTA / KONTAKT ===================== -->\n  <section id=\"kontakt\" style=\"position:relative; overflow:hidden; padding:120px 32px; text-align:center;\">\n    <div style=\"position:absolute; inset:0; background:radial-gradient(70% 120% at 50% 0%, rgba(37,99,235,0.22), transparent 60%); pointer-events:none;\"><\u002Fdiv>\n    <!-- Radar scanner -->\n    <div style=\"position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:400px; height:400px; pointer-events:none; opacity:0.08;\">\n      <svg viewBox=\"0 0 400 400\" width=\"400\" height=\"400\">\n        <circle cx=\"200\" cy=\"200\" r=\"190\" fill=\"none\" stroke=\"#22D3EE\" stroke-width=\"0.5\"><\u002Fcircle>\n        <circle cx=\"200\" cy=\"200\" r=\"140\" fill=\"none\" stroke=\"#22D3EE\" stroke-width=\"0.4\"><\u002Fcircle>\n        <circle cx=\"200\" cy=\"200\" r=\"90\" fill=\"none\" stroke=\"#22D3EE\" stroke-width=\"0.3\"><\u002Fcircle>\n        <circle cx=\"200\" cy=\"200\" r=\"40\" fill=\"none\" stroke=\"#22D3EE\" stroke-width=\"0.3\"><\u002Fcircle>\n        <line x1=\"10\" y1=\"200\" x2=\"390\" y2=\"200\" stroke=\"#22D3EE\" stroke-width=\"0.3\"><\u002Fline>\n        <line x1=\"200\" y1=\"10\" x2=\"200\" y2=\"390\" stroke=\"#22D3EE\" stroke-width=\"0.3\"><\u002Fline>\n        <g style=\"transform-origin:200px 200px; animation:gRadarSweep 6s linear infinite;\">\n          <line x1=\"200\" y1=\"200\" x2=\"200\" y2=\"10\" stroke=\"url(#ctaG)\" stroke-width=\"1.5\"><\u002Fline>\n          <path d=\"M200 200 L200 10 A190 190 0 0 1 334 67 Z\" fill=\"url(#ctaG)\" opacity=\"0.15\"><\u002Fpath>\n        <\u002Fg>\n      <\u002Fsvg>\n    <\u002Fdiv>\n    <div style=\"position:relative; z-index:2; max-width:680px; margin:0 auto;\">\n      <!-- Arc reactor logo -->\n      <div style=\"position:relative; width:80px; height:80px; margin:0 auto 26px;\">\n        <div style=\"position:absolute; inset:-12px; border-radius:50%; border:1px solid rgba(34,211,238,0.2); animation:gArcPulse 3s ease-in-out infinite;\"><\u002Fdiv>\n        <div style=\"position:absolute; inset:-24px; border-radius:50%; border:1px solid rgba(59,130,246,0.1); animation:gArcPulse 3s ease-in-out 0.5s infinite;\"><\u002Fdiv>\n        <div style=\"position:absolute; inset:-36px; border-radius:50%; border:1px solid rgba(34,211,238,0.06); animation:gArcPulse 3s ease-in-out 1s infinite;\"><\u002Fdiv>\n        <svg viewBox=\"0 0 100 100\" width=\"80\" height=\"80\"><defs><linearGradient id=\"ctaG\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#3b82f6\"><\u002Fstop><stop offset=\"1\" stop-color=\"#22d3ee\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs><circle cx=\"50\" cy=\"50\" r=\"33\" fill=\"none\" stroke=\"url(#ctaG)\" stroke-width=\"11\" stroke-linecap=\"round\" stroke-dasharray=\"160 47.4\" transform=\"rotate(32 50 50)\"><\u002Fcircle><rect x=\"50\" y=\"44.5\" width=\"24\" height=\"11\" rx=\"5.5\" fill=\"url(#ctaG)\"><\u002Frect><\u002Fsvg>\n      <\u002Fdiv>\n      <h2 style=\"font-size:clamp(30px,4.4vw,48px); font-weight:800; letter-spacing:-0.04em; line-height:1.06; margin-bottom:18px;\">Klar til å fjerne rutinearbeidet?<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.65; color:#94A3B8; margin-bottom:32px;\">Ta en uforpliktende prat. Vi finner ut hva som er verdt å automatisere først.<\u002Fp>\n      <a href=\"mailto:lucas@gardnersolutions.no\" style=\"display:inline-flex; align-items:center; gap:10px; font-size:16px; font-weight:700; color:#05070F; background:linear-gradient(135deg,#2563EB,#22D3EE); padding:17px 34px; border-radius:13px; text-decoration:none; box-shadow:0 16px 40px -12px rgba(34,211,238,0.55);\">\n        Send en e-post\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m12 5 7 7-7 7\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FOOTER ===================== -->\n  <footer style=\"border-top:1px solid #11151f; padding:48px 32px;\">\n    <div style=\"max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap;\">\n      <div style=\"display:flex; align-items:center; gap:11px;\">\n        <svg viewBox=\"0 0 100 100\" width=\"30\" height=\"30\"><defs><linearGradient id=\"ftG\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#3b82f6\"><\u002Fstop><stop offset=\"1\" stop-color=\"#22d3ee\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs><circle cx=\"50\" cy=\"50\" r=\"33\" fill=\"none\" stroke=\"url(#ftG)\" stroke-width=\"11\" stroke-linecap=\"round\" stroke-dasharray=\"160 47.4\" transform=\"rotate(32 50 50)\"><\u002Fcircle><rect x=\"50\" y=\"44.5\" width=\"24\" height=\"11\" rx=\"5.5\" fill=\"url(#ftG)\"><\u002Frect><\u002Fsvg>\n        <span style=\"font-size:15px; font-weight:800; letter-spacing:-0.03em;\">Gardner <span style=\"color:#22D3EE; font-weight:700;\">Solutions<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px; color:#475569;\">Longum-Gardner Solutions ENK · Stavanger · 2026<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.canvasRef = React.createRef();\n    this._timers = [];\n  }\n\n  state = { chatOpen: false, chatMessages: [], chatInput: '', chatTyping: false, showSuggestions: true };\n\n  RESPONSES = {\n    'Hva gjør dere?': 'Vi bygger skreddersydde AI-løsninger og automatiseringer for små og mellomstore bedrifter. Alt fra smarte faktura-systemer til AI-assistenter som svarer kunder 24/7 — tilpasset akkurat din bedrift.',\n    'Hva koster det?': 'Vi tilpasser pris etter prosjektet. Enkle automatiseringer starter fra ca. 5 000 kr, mens større AI-løsninger avtales individuelt. Ingen skjulte kostnader, og du betaler aldri for noe du ikke trenger.',\n    'Passer dette for meg?': 'Har du oppgaver som gjentar seg — faktura, kundeoppfølging, booking, rapportering? Da kan vi nesten garantert spare deg for tid. Vi starter alltid med en gratis kartlegging for å finne ut hva som gir mest verdi.',\n    'Hvordan starter jeg?': 'Enkelt! Send oss en e-post eller book et kort møte. Vi kartlegger hva du bruker tid på, foreslår en løsning, og bygger den sammen med deg. Første samtale er alltid gratis og uforpliktende.'\n  };\n\n  componentDidMount() { this.initThree(); }\n\n  componentWillUnmount() {\n    this._stop = true;\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._poll) clearTimeout(this._poll);\n    this._timers.forEach(clearTimeout);\n    if (this._onMove) window.removeEventListener('mousemove', this._onMove);\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n\n  clearTimers() { this._timers.forEach(clearTimeout); this._timers = []; }\n\n  openChat() {\n    this.setState({ chatOpen: true });\n  }\n\n  closeChat() {\n    this.setState({ chatOpen: false });\n  }\n\n  sendChatMessage(text) {\n    if (!text || !text.trim()) return;\n    var self = this;\n    var msgs = this.state.chatMessages.slice();\n    msgs.push({ isUser: true, isBot: false, text: text.trim() });\n    this.setState({ chatMessages: msgs, chatInput: '', chatTyping: true, showSuggestions: false });\n\n    // Find matching response or fallback\n    var response = this.RESPONSES[text.trim()];\n    if (!response) {\n      response = 'Godt spørsmål! For å gi deg et skikkelig svar, anbefaler jeg å ta kontakt med oss direkte på lucas@gardnersolutions.no — så finner vi ut hva som passer best for deg.';\n    }\n\n    this._timers.push(setTimeout(function() {\n      var msgs2 = self.state.chatMessages.slice();\n      msgs2.push({ isUser: false, isBot: true, text: response });\n      self.setState({ chatMessages: msgs2, chatTyping: false, showSuggestions: true });\n    }, 1200 + Math.random() * 800));\n  }\n\n  renderVals() {\n    var s = this.state;\n    var self = this;\n    var sugLabels = ['Hva gjør dere?', 'Hva koster det?', 'Passer dette for meg?', 'Hvordan starter jeg?'];\n    var suggestions = sugLabels.map(function(label) {\n      return { label: label, onClick: function() { self.sendChatMessage(label); } };\n    });\n\n    return {\n      canvasRef: this.canvasRef,\n      running: s.chatTyping,\n      progressWidth: '0%',\n      chatOpen: s.chatOpen,\n      chatMessages: s.chatMessages,\n      chatInput: s.chatInput,\n      chatTyping: s.chatTyping,\n      showSuggestions: s.showSuggestions && !s.chatTyping,\n      suggestions: suggestions,\n      openChat: function() { self.openChat(); },\n      closeChat: function() { self.closeChat(); },\n      onChatInput: function(e) { self.setState({ chatInput: e.target.value }); },\n      onChatKeyDown: function(e) { if (e.key === 'Enter') self.sendChatMessage(self.state.chatInput); },\n      sendChat: function() { self.sendChatMessage(self.state.chatInput); }\n    };\n  }\n\n  initThree() {\n    var self = this;\n    var tryInit = function() {\n      var THREE = window.THREE;\n      var canvas = self.canvasRef && self.canvasRef.current;\n      if (!THREE || !canvas) { self._poll = setTimeout(tryInit, 150); return; }\n      var parent = canvas.parentElement;\n      var w = parent.clientWidth || 1000, h = parent.clientHeight || 700;\n\n      var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });\n      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));\n      renderer.setSize(w, h, false);\n\n      var scene = new THREE.Scene();\n      var camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100);\n      camera.position.z = 18;\n\n      var group = new THREE.Group();\n      scene.add(group);\n      group.position.x = 3.5;\n\n      var cBlue = new THREE.Color('#3b82f6');\n      var cCyan = new THREE.Color('#22d3ee');\n\n      // Glow dot texture\n      var dotCanvas = document.createElement('canvas');\n      dotCanvas.width = 64; dotCanvas.height = 64;\n      var dctx = dotCanvas.getContext('2d');\n      var grad = dctx.createRadialGradient(32,32,0,32,32,32);\n      grad.addColorStop(0, 'rgba(255,255,255,1)');\n      grad.addColorStop(0.15, 'rgba(255,255,255,0.8)');\n      grad.addColorStop(0.4, 'rgba(140,200,255,0.3)');\n      grad.addColorStop(1, 'rgba(0,0,0,0)');\n      dctx.fillStyle = grad;\n      dctx.fillRect(0,0,64,64);\n      var dotTex = new THREE.CanvasTexture(dotCanvas);\n\n      // Bright fire dot texture\n      var fireCanvas = document.createElement('canvas');\n      fireCanvas.width = 64; fireCanvas.height = 64;\n      var fctx = fireCanvas.getContext('2d');\n      var fgrad = fctx.createRadialGradient(32,32,0,32,32,32);\n      fgrad.addColorStop(0, 'rgba(255,255,255,1)');\n      fgrad.addColorStop(0.12, 'rgba(34,211,238,0.9)');\n      fgrad.addColorStop(0.35, 'rgba(34,211,238,0.35)');\n      fgrad.addColorStop(1, 'rgba(0,0,0,0)');\n      fctx.fillStyle = fgrad;\n      fctx.fillRect(0,0,64,64);\n      var fireTex = new THREE.CanvasTexture(fireCanvas);\n\n      // Brain shape\n      var nodes = [];\n      var N = 260;\n      for (var i = 0; i < N; i++) {\n        var u = Math.random(), v = Math.random();\n        var theta = 2 * Math.PI * u;\n        var phi = Math.acos(2 * v - 1);\n        var r = 5.0;\n        var x = r * 0.82 * Math.sin(phi) * Math.cos(theta);\n        var y = r * Math.sin(phi) * Math.sin(theta);\n        var z = r * 0.72 * Math.cos(phi);\n        var pinch = 1 - 0.22 * Math.exp(-x * x * 2.5);\n        y *= pinch; z *= pinch;\n        if (y > 0) y *= 1.15;\n        // Brain folds — push outward with noise\n        var fold = 1 + 0.12 * Math.sin(theta * 6) * Math.sin(phi * 4);\n        x *= fold; y *= fold; z *= fold;\n        nodes.push(new THREE.Vector3(x, y, z));\n      }\n\n      // Nodes — round glow dots\n      var nodeGeo = new THREE.BufferGeometry().setFromPoints(nodes);\n      var ncol = [];\n      nodes.forEach(function(n) { var t = (n.y / 5.5 + 1) / 2; var c = cBlue.clone().lerp(cCyan, t); ncol.push(c.r, c.g, c.b); });\n      nodeGeo.setAttribute('color', new THREE.Float32BufferAttribute(ncol, 3));\n      var nodeMat = new THREE.PointsMaterial({ size: 0.48, map: dotTex, vertexColors: true, transparent: true, opacity: 1, depthWrite: false, blending: THREE.AdditiveBlending });\n      group.add(new THREE.Points(nodeGeo, nodeMat));\n\n      // Synapses\n      var lpos = [], lcol = [], TH = 3.2;\n      for (var i = 0; i < N; i++) {\n        var conns = 0;\n        for (var j = i + 1; j < N && conns < 6; j++) {\n          var d = nodes[i].distanceTo(nodes[j]);\n          if (d < TH) {\n            lpos.push(nodes[i].x, nodes[i].y, nodes[i].z, nodes[j].x, nodes[j].y, nodes[j].z);\n            var ti = (nodes[i].y / 5.5 + 1) / 2, tj = (nodes[j].y / 5.5 + 1) / 2;\n            var ci = cBlue.clone().lerp(cCyan, ti), cj = cBlue.clone().lerp(cCyan, tj);\n            lcol.push(ci.r, ci.g, ci.b, cj.r, cj.g, cj.b);\n            conns++;\n          }\n        }\n      }\n      var lgeo = new THREE.BufferGeometry();\n      lgeo.setAttribute('position', new THREE.Float32BufferAttribute(lpos, 3));\n      lgeo.setAttribute('color', new THREE.Float32BufferAttribute(lcol, 3));\n      var lmat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.18, blending: THREE.AdditiveBlending });\n      group.add(new THREE.LineSegments(lgeo, lmat));\n\n      // Firing neurons — glowing pulses traveling between nodes\n      var fireCount = 40;\n      var fireData = [];\n      for (var fi = 0; fi < fireCount; fi++) {\n        var a = Math.floor(Math.random() * N), b;\n        // Pick a nearby node for the path\n        b = a;\n        var bestD = 999;\n        for (var fj = 0; fj < N; fj++) {\n          if (fj === a) continue;\n          var dd = nodes[a].distanceTo(nodes[fj]);\n          if (dd < TH && dd < bestD) { bestD = dd; b = fj; }\n        }\n        fireData.push({ from: nodes[a], to: nodes[b], t: Math.random(), speed: 0.006 + Math.random() * 0.012, srcIdx: a });\n      }\n      var fireGeo = new THREE.BufferGeometry();\n      var firePos = new Float32Array(fireCount * 3);\n      fireGeo.setAttribute('position', new THREE.BufferAttribute(firePos, 3));\n      var fireMat = new THREE.PointsMaterial({ size: 0.7, map: fireTex, color: cCyan, transparent: true, opacity: 1, depthWrite: false, blending: THREE.AdditiveBlending });\n      var firePts = new THREE.Points(fireGeo, fireMat);\n      group.add(firePts);\n\n      // Core reactor glow\n      var coreGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0.3,0)]);\n      var coreMat = new THREE.PointsMaterial({ size: 12, map: fireTex, color: new THREE.Color('#ffffff'), transparent: true, opacity: 1, depthWrite: false, blending: THREE.AdditiveBlending });\n      var corePt = new THREE.Points(coreGeo, coreMat);\n      group.add(corePt);\n      var coreGeo2 = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0.3,0)]);\n      var coreMat2 = new THREE.PointsMaterial({ size: 22, map: dotTex, color: cCyan, transparent: true, opacity: 0.7, depthWrite: false, blending: THREE.AdditiveBlending });\n      group.add(new THREE.Points(coreGeo2, coreMat2));\n\n      // Spinal cord\n      var spPts = [];\n      for (var si = 0; si <= 24; si++) {\n        var st = si / 24;\n        spPts.push(new THREE.Vector3(Math.sin(st * 3.5) * 0.2, -5.0 - st * 4.5, Math.cos(st * 2) * 0.1));\n      }\n      var spGeo = new THREE.BufferGeometry().setFromPoints(spPts);\n      var spMat = new THREE.LineBasicMaterial({ color: cBlue, transparent: true, opacity: 0.2 });\n      group.add(new THREE.Line(spGeo, spMat));\n\n      // Mouse\n      var tx = 0, ty = 0, mx = 0, my = 0;\n      self._onMove = function(e) { mx = (e.clientX / window.innerWidth - 0.5); my = (e.clientY / window.innerHeight - 0.5); };\n      window.addEventListener('mousemove', self._onMove);\n\n      var time = 0;\n      var animate = function() {\n        if (self._stop) return;\n        time += 0.016;\n        group.rotation.y += 0.0015;\n\n        tx += ((my * 0.3) - tx) * 0.035;\n        ty += ((mx * 0.4) - ty) * 0.035;\n        group.rotation.x = 0.2 + tx;\n        group.rotation.z = ty * 0.12;\n\n        // Pulse synapse + core\n        lmat.opacity = 0.1 + Math.sin(time * 1.2) * 0.05;\n        coreMat.opacity = 0.75 + Math.sin(time * 2.5) * 0.25;\n        coreMat2.opacity = 0.18 + Math.sin(time * 1.8) * 0.1;\n\n        // Fire neurons — travel along nearby connections\n        var fp = fireGeo.getAttribute('position');\n        for (var fi = 0; fi < fireCount; fi++) {\n          var fd = fireData[fi];\n          fd.t += fd.speed;\n          if (fd.t > 1) {\n            fd.t = 0;\n            fd.from = fd.to;\n            // Find a nearby connected node to travel to next\n            var best = fd.from; var bestD = 999;\n            for (var fk = 0; fk < 20; fk++) {\n              var ri = Math.floor(Math.random() * N);\n              var dd = fd.from.distanceTo(nodes[ri]);\n              if (dd > 0.3 && dd < TH && dd < bestD) { bestD = dd; best = nodes[ri]; }\n            }\n            fd.to = best;\n          }\n          fp.setXYZ(fi, fd.from.x + (fd.to.x - fd.from.x) * fd.t, fd.from.y + (fd.to.y - fd.from.y) * fd.t, fd.from.z + (fd.to.z - fd.from.z) * fd.t);\n        }\n        fp.needsUpdate = true;\n\n        renderer.render(scene, camera);\n        self._raf = requestAnimationFrame(animate);\n      };\n      animate();\n\n      self._onResize = function() {\n        w = parent.clientWidth; h = parent.clientHeight;\n        renderer.setSize(w, h, false);\n        camera.aspect = w / h; camera.updateProjectionMatrix();\n      };\n      window.addEventListener('resize', self._onResize);\n    };\n    tryInit();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
